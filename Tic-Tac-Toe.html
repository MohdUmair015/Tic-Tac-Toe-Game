<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Tic Tac Toe</title>

    <link rel="stylesheet" href="Tic-Tac-Toe.css" />
  </head>

  <body>
    <div class="container">
      <h1>Tic-Tac-Toe</h1>

      <p>Take turns placing X and O. First to get three in a row wins.</p>

      <!-- Scoreboard -->

      <div class="scoreboard">
        <div class="score-card">
          <h3>PLAYER X</h3>
          <span id="x-score">0</span>
        </div>

        <div class="score-card">
          <h3>DRAWS</h3>
          <span id="draw-score">0</span>
        </div>

        <div class="score-card">
          <h3>PLAYER O</h3>
          <span id="o-score">0</span>
        </div>
      </div>

      <!-- Mode Selector -->
      <div class="mode-selector">
        <button id="single-player">Single Player</button>

        <button id="two-player">Two Players</button>
      </div>

      <!-- Difficulty Selector -->
      <div id="difficulty-container">
        <div class="difficulty-selector">
          <button id="easy-btn" class="difficulty active-difficulty">
            Easy
          </button>

          <button id="medium-btn" class="difficulty">Medium</button>

          <button id="hard-btn" class="difficulty">Hard</button>
        </div>
      </div>
      <!-- Status -->

      <h2 id="status">Player X's Turn</h2>

      <!-- Board -->

      <div class="board">
        <div class="cell" data-index="0"></div>
        <div class="cell" data-index="1"></div>
        <div class="cell" data-index="2"></div>

        <div class="cell" data-index="3"></div>
        <div class="cell" data-index="4"></div>
        <div class="cell" data-index="5"></div>

        <div class="cell" data-index="6"></div>
        <div class="cell" data-index="7"></div>
        <div class="cell" data-index="8"></div>
      </div>

      <div class="buttons">
        <button id="new-round">New Round</button>

        <button id="reset">Reset Scores</button>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <script src="Tic-Tac-Toe.js"></script>
  </body>
</html>
